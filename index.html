<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp: Common People - Interactive Comic</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .font-comic { font-family: 'Comic Neue', cursive; }
        .font-bangers { font-family: 'Bangers', cursive; }
        .font-signature { font-family: 'Pinyon Script', cursive; }
        .perspective-1000 { perspective: 1000px; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        
        /* Custom scrollbar for lyrics */
        .lyrics-scroll::-webkit-scrollbar { width: 6px; }
        .lyrics-scroll::-webkit-scrollbar-track { background: transparent; }
        .lyrics-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .lyrics-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .comic-panel {
            box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
            border: 3px solid black;
        }
        
        @media (min-width: 640px) {
            .comic-panel {
                box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
                border: 4px solid black;
            }
        }

        .smooth-scroll {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const ChevronLeft = (props) => <Icon {...props}><path d="m15 18-6-6 6-6"/></Icon>;
        const ChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
        const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const Pause = (props) => <Icon {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></Icon>;
        const Volume2 = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
        const VolumeX = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></Icon>;
        const BookOpen = (props) => <Icon {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Zap = (props) => <Icon {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const ZapOff = (props) => <Icon {...props}><polyline points="12.41 6.75 13 2 10.57 4.92"/><polyline points="18.57 12.91 21 10 15.66 10"/><polyline points="8 8 3 14 12 14 11 22 16 15.12"/><line x1="1" y1="1" x2="23" y2="23"/></Icon>;
        const Maximize = (props) => <Icon {...props}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>;
        const Minimize = (props) => <Icon {...props}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></Icon>;

        // --- DATA ---
        const REPO_BASE_URL = "https://raw.githubusercontent.com/sinanseden-eng/common-people/main/";
        const CACHE_BUSTER = "?v=23";

        const pages = [
            {
                id: 1,
                type: "intro",
                text: "COMMON PEOPLE",
                subtext: "Interactive Comic Experience",
                image: `${REPO_BASE_URL}1.jpg${CACHE_BUSTER}`,
                timestamp: 0 
            },
            {
                id: 2,
                lyrics: "She came from Greece, she had a thirst for knowledge\nShe studied sculpture at Saint Martin's College",
                image: `${REPO_BASE_URL}2.jpg${CACHE_BUSTER}`, 
                bgColor: "bg-amber-100",
                timestamp: 8,
                noScroll: true
            },
            {
                id: 3,
                lyrics: "That's where I caught her eye\nShe told me that her Dad was loaded",
                image: `${REPO_BASE_URL}3.jpg${CACHE_BUSTER}`,
                bgColor: "bg-amber-900",
                timestamp: 17,
                noScroll: true
            },
            {
                id: 4,
                lyrics: "I said \"In that case, I'll have rum and Coca-Cola\"\nShe said \"fine\"\nAnd then in thirty seconds time she said",
                image: `${REPO_BASE_URL}4.jpg${CACHE_BUSTER}`,
                bgColor: "bg-green-900",
                timestamp: 25,
                noScroll: true
            },
            {
                id: 5,
                lyrics: "\"I wanna live like common people\nI wanna do whatever common people do\nWanna sleep with common people\nI wanna sleep with common people like you\"\nWell,​ what else could I do?\nI said \"I'll, I'll see what I can do\"",
                image: `${REPO_BASE_URL}5.jpg${CACHE_BUSTER}`,
                bgColor: "bg-slate-500",
                timestamp: 35
            },
            {
                id: 6,
                lyrics: "I took her to a supermarket\nI don't know why but I had to start it somewhere\nSo it started there",
                image: `${REPO_BASE_URL}7.jpg${CACHE_BUSTER}`,
                bgColor: "bg-red-100",
                timestamp: 60,
                slowScroll: true
            },
            {
                id: 7,
                lyrics: "I said, \"Pretend you got no money\"\nAnd she just laughed and said, \"Oh, you're so funny\"\nI said, \"Yeah, well, I can't see anyone else smiling in here\"\nAre you sure?",
                image: `${REPO_BASE_URL}7.jpg${CACHE_BUSTER}`,
                bgColor: "bg-red-300",
                timestamp: 67,
                slowScroll: true
            },
            {
                id: 8,
                lyrics: "You wanna live like common people\nYou wanna see whatever common people see\nWanna sleep with common people\nYou wanna sleep with common people like me?\nBut she didn’t understand\nAnd she just smiled and held my hand",
                image: `${REPO_BASE_URL}8.jpg${CACHE_BUSTER}`,
                bgColor: "bg-blue-900",
                timestamp: 87
            },
            {
                id: 9,
                lyrics: "Oh, rent a flat above a shop\nAnd cut your hair and get a job\nAnd smoke some fags and play some pool\nPretend you never went to school",
                image: `${REPO_BASE_URL}6.jpg${CACHE_BUSTER}`,
                bgColor: "bg-yellow-100",
                timestamp: 111.5
            },
            {
                id: 10,
                lyrics: "But still you'll never get it right\n'Cause when you're laid in bed at night\nWatching roaches climb the wall\nIf you called your dad he could stop it all, yeah\nYou'll never live like common people\nYou'll never do whatever common people do\nNever fail like common people\nYou'll never watch your life slide out of view",
                image: `${REPO_BASE_URL}9.jpg${CACHE_BUSTER}`,
                bgColor: "bg-slate-900",
                timestamp: 123
            },
            {
                id: 11,
                lyrics: "And then dance and drink and screw\nBecause there's nothing else to do\nOh!",
                image: `${REPO_BASE_URL}10.jpg${CACHE_BUSTER}`,
                bgColor: "bg-orange-900",
                timestamp: 152 
            },
            {
                id: 12,
                lyrics: "Sing along with the common people\nSing along and it might just get you through\nLaugh along with the common people\nLaugh along, even though they're laughing at you\nAnd the stupid things that you do\nBecause you think that poor is cool",
                image: `${REPO_BASE_URL}11.jpg${CACHE_BUSTER}`,
                bgColor: "bg-red-900",
                timestamp: 185 
            },
            {
                id: 13,
                lyrics: "Like a dog lying in a corner\nThey will bite you and never warn you\nLook out, they'll tear your insides out\n'Cause everybody hates a tourist\nEspecially one who thinks it's all such a laugh\nYeah, and the chip stains and grease will come out in the bath",
                image: `${REPO_BASE_URL}12.jpg${CACHE_BUSTER}`,
                bgColor: "bg-purple-900",
                timestamp: 208
            },
            {
                id: 13.5, 
                lyrics: "You will never understand\nHow it feels to live your life\nWith no meaning or control\nAnd with nowhere left to go\nYou are amazed that they exist\nAnd they burn so bright whilst you can only wonder why\nRent a flat above a shop\nCut your hair and get a job\nAnd smoke some fags and play some pool\nPretend you never went to school\nBut still you'll never get it right\n'Cause when you're laid in bed at night\nWatching roaches climb the wall\nIf you called your dad he could stop it all, yeah",
                image: `${REPO_BASE_URL}12.jpg${CACHE_BUSTER}`, 
                bgColor: "bg-purple-950",
                timestamp: 240 
            },
            {
                id: 14,
                lyrics: "Wanna live with common people like you\nWanna live with common people like you\nWanna live with common people like you\nWanna live with common people like you\nWanna live with common people like you\nWanna live with common people like you\nWanna live with common people like you",
                image: `${REPO_BASE_URL}13.jpg${CACHE_BUSTER}`,
                bgColor: "bg-cyan-800",
                timestamp: 307 
            },
            {
                id: 15,
                lyrics: "La, la, la, la\nOoh, la, la, la, la\nOoh, la, la, la, la\nOoh, la, la-la-la-la, la, oh yeah",
                image: `${REPO_BASE_URL}14.jpg${CACHE_BUSTER}`,
                bgColor: "bg-blue-950",
                timestamp: 325 
            }
        ];

        // --- APP ---
        const ComicReader = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [audioStatus, setAudioStatus] = useState('loading');
            const [autoFlip, setAutoFlip] = useState(true);
            const [fitMode, setFitMode] = useState('contain'); // Default to contain for mobile
            const [currentTime, setCurrentTime] = useState(0);
            
            const audioRef = useRef(null);
            const lyricScrollRef = useRef(null);

            const totalPages = pages.length;
            const defaultAudioUrl = "https://github.com/sinanseden-eng/common-people/raw/main/common_people.mp3";

            const togglePlay = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play().catch(e => setAudioStatus('error'));
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            const toggleFit = () => {
                setFitMode(fitMode === 'contain' ? 'cover' : 'contain');
            };

            const nextPage = () => currentPage < totalPages - 1 && setCurrentPage(currentPage + 1);
            const prevPage = () => currentPage > 0 && setCurrentPage(currentPage - 1);

            const handleTimeUpdate = () => {
                if (!audioRef.current) return;
                const time = audioRef.current.currentTime;
                setCurrentTime(time);
                if (!autoFlip) return;
                
                let activeIndex = 0;
                for (let i = 0; i < pages.length; i++) {
                    if (time >= pages[i].timestamp) activeIndex = i;
                    else break;
                }
                if (activeIndex !== currentPage) setCurrentPage(activeIndex);
            };

            // SYNC LOGIC: Auto-scroll lyrics based on progress in current panel
            useEffect(() => {
                const container = lyricScrollRef.current;
                if (!container) return;
                
                const currentData = pages[currentPage];
                
                if (currentData.noScroll) {
                    container.scrollTop = 0;
                    return;
                }

                const nextData = pages[currentPage + 1];
                const startTime = currentData.timestamp;
                const endTime = nextData ? nextData.timestamp : (audioRef.current?.duration || startTime + 30);
                
                const duration = endTime - startTime;
                const elapsed = currentTime - startTime;
                
                if (elapsed >= 0 && duration > 0) {
                    let progress = elapsed / duration;
                    
                    if (currentData.slowScroll) {
                        progress = Math.pow(progress, 1.4); 
                    }

                    const maxScroll = container.scrollHeight - container.clientHeight;
                    if (maxScroll > 0) {
                        container.scrollTop = maxScroll * progress;
                    }
                }
            }, [currentTime, currentPage]);

            useEffect(() => {
                if (audioRef.current) {
                    const target = pages[currentPage].timestamp || 0;
                    if (Math.abs(audioRef.current.currentTime - target) > 3) {
                        audioRef.current.currentTime = target;
                    }
                }
            }, [currentPage]);

            const currentData = pages[currentPage];

            return (
                <div className="flex flex-col h-[100dvh] bg-gray-950 text-white font-sans overflow-hidden">
                    <audio 
                        ref={audioRef} loop preload="auto" src={defaultAudioUrl}
                        onTimeUpdate={handleTimeUpdate} 
                        onCanPlay={() => setAudioStatus('ready')}
                        onError={() => setAudioStatus('error')}
                    />

                    {/* Header */}
                    <header className="h-14 sm:h-16 shrink-0 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-2 sm:px-4 z-50">
                        <div className="flex items-center space-x-2 text-pink-500">
                            <BookOpen size={20} className="sm:w-6 sm:h-6" />
                            <span className="font-bangers text-xl sm:text-2xl tracking-widest hidden sm:block">PULP COMICS</span>
                        </div>
                        
                        <div className="flex items-center gap-2 sm:gap-4 bg-black/40 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full border border-gray-800">
                            <button onClick={toggleFit} className="p-1 text-gray-400 hover:text-white transition-colors hidden sm:block" title="Toggle Image Fit">
                                {fitMode === 'contain' ? <Maximize size={18}/> : <Minimize size={18}/>}
                            </button>
                            <button onClick={() => setAutoFlip(!autoFlip)} className={`p-1 ${autoFlip ? 'text-green-500' : 'text-gray-500'}`} title="Auto-Flip"><Zap size={18}/></button>
                            <button onClick={togglePlay} className="text-white hover:text-pink-500 transition-colors px-1">
                                {isPlaying ? <Pause size={22} /> : <Play size={22} />}
                            </button>
                            <button onClick={() => { if(audioRef.current) { audioRef.current.muted = !isMuted; setIsMuted(!isMuted); } }} className="p-1 text-gray-400 hover:text-white transition-colors">
                                {isMuted ? <VolumeX size={18} /> : <Volume2 size={18} />}
                            </button>
                        </div>

                        <div className="text-xs sm:text-sm font-mono text-gray-500 w-12 text-right">{currentPage + 1}/{totalPages}</div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 min-h-0 relative flex items-center justify-center p-2 sm:p-4">
                        <button onClick={prevPage} className="absolute left-2 sm:left-4 z-40 p-1 sm:p-2 bg-black/50 text-white/50 hover:text-white rounded-full hover:bg-pink-500 transition-colors"><ChevronLeft size={28}/></button>
                        <button onClick={nextPage} className="absolute right-2 sm:right-4 z-40 p-1 sm:p-2 bg-black/50 text-white/50 hover:text-white rounded-full hover:bg-pink-500 transition-colors"><ChevronRight size={28}/></button>

                        <div className="w-full max-w-5xl h-full flex flex-col items-center justify-center">
                            <div key={currentPage} className={`comic-panel relative w-full h-full bg-white flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-500 rounded-lg sm:rounded-none`}>
                                
                                {/* Image Area */}
                                <div className={`flex-1 relative overflow-hidden ${currentData.bgColor || 'bg-gray-200'} flex items-center justify-center w-full min-h-0`}>
                                    {currentData.image && (
                                        <img 
                                            src={currentData.image} 
                                            className={`w-full h-full transition-all duration-300 ${fitMode === 'contain' ? 'object-contain' : 'object-cover'}`}
                                            alt="Comic Panel"
                                        />
                                    )}
                                    
                                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '8px 8px' }}></div>
                                    
                                    {currentData.type === 'intro' && (
                                        <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-4 sm:p-8 text-center">
                                            <h1 className="text-5xl sm:text-7xl font-black text-pink-500 font-bangers tracking-tighter drop-shadow-[0_4px_0_rgba(255,255,255,1)] transform -rotate-3 mb-2 sm:mb-4">COMMON</h1>
                                            <h1 className="text-5xl sm:text-7xl font-black text-white font-bangers tracking-tighter drop-shadow-[0_4px_0_rgba(236,72,153,1)] transform rotate-2">PEOPLE</h1>
                                            <p className="mt-4 sm:mt-8 font-comic text-lg sm:text-xl text-pink-200 italic">"Sing along and it might just get you through..."</p>
                                        </div>
                                    )}
                                </div>

                                {/* Lyric Area */}
                                {currentData.type !== 'intro' && (
                                    <div className="shrink-0 bg-white border-t-2 sm:border-t-4 border-black p-2 sm:p-5 landscape:p-2 flex flex-col items-center justify-center text-center relative overflow-hidden h-[35%] min-h-[90px] max-h-[180px] landscape:h-[30%] landscape:min-h-[70px]">
                                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-full w-0 h-0 border-l-[10px] sm:border-l-[15px] landscape:border-l-[8px] border-l-transparent border-r-[10px] sm:border-r-[15px] landscape:border-r-[8px] border-r-transparent border-b-[10px] sm:border-b-[15px] landscape:border-b-[8px] border-b-white"></div>
                                        <div 
                                            ref={lyricScrollRef}
                                            className="lyrics-scroll overflow-y-auto w-full px-2 sm:px-4 h-full smooth-scroll no-scrollbar"
                                        >
                                            <div className="font-comic text-black text-base sm:text-xl md:text-2xl landscape:text-sm landscape:sm:text-lg font-bold leading-snug py-1 sm:py-4 landscape:py-1">
                                                {currentData.lyrics.split('\n').map((line, i) => <p key={i} className="mb-1 sm:mb-2 landscape:mb-1">{line}</p>)}
                                                {!currentData.noScroll && <div className="h-24 sm:h-40 landscape:h-20"></div>}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="absolute bottom-2 right-4 sm:bottom-4 sm:right-6 font-signature text-2xl sm:text-4xl text-black/40 pointer-events-none">Sinan</div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComicReader />);
    </script>
</body>
</html>
