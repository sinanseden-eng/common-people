<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulp: Common People - Interactive Comic</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .font-comic { font-family: 'Comic Neue', cursive; }
        .font-bangers { font-family: 'Bangers', cursive; }
        .font-signature { font-family: 'Pinyon Script', cursive; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .smooth-scroll { scroll-behavior: smooth; }
        .comic-panel {
            box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
            border: 3px solid black;
        }
        @media (min-width: 640px) {
            .comic-panel {
                box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
                border: 4px solid black;
            }
        }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const ChevronLeft = (props) => <Icon {...props}><path d="m15 18-6-6 6-6"/></Icon>;
        const ChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
        const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const Pause = (props) => <Icon {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></Icon>;
        const Volume2 = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
        const VolumeX = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></Icon>;
        const BookOpen = (props) => <Icon {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Zap = (props) => <Icon {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const Maximize = (props) => <Icon {...props}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>;

        // --- DATA ---
        const REPO_BASE_URL = "https://raw.githubusercontent.com/sinanseden-eng/common-people/main/";
        const CACHE_BUSTER = "?v=28"; 

        const pages = [
            {
                id: 1,
                type: "intro",
                text: "COMMON PEOPLE",
                subtext: "Pulp - Interactive Comic",
                image: `${REPO_BASE_URL}1.jpg${CACHE_BUSTER}`,
                bgColor: "bg-black",
                timestamp: 0 
            },
            {
                id: 2,
                lyrics: "She came from Greece, she had a thirst for knowledge\nShe studied sculpture at Saint Martin's College\nThat's where I caught her eye",
                image: `${REPO_BASE_URL}2.jpg${CACHE_BUSTER}`, 
                bgColor: "bg-slate-800",
                timestamp: 17,
                slowScroll: true
            },
            {
                id: 3,
                lyrics: "She told me that her dad was loaded\nI said, in that case I'll have rum and coca-cola\nShe said fine",
                image: `${REPO_BASE_URL}3.jpg${CACHE_BUSTER}`,
                bgColor: "bg-amber-950",
                timestamp: 32
            },
            {
                id: 4,
                lyrics: "And then in thirty seconds time she said:\nI wanna live like common people\nI wanna do whatever common people do",
                image: `${REPO_BASE_URL}4.jpg${CACHE_BUSTER}`,
                bgColor: "bg-emerald-950",
                timestamp: 48,
                slowScroll: true
            },
            {
                id: 5,
                lyrics: "I wanna sleep with common people\nI wanna sleep with common people like you\nWell what else could I do?\nI said, I'll see what I can do",
                image: `${REPO_BASE_URL}5.jpg${CACHE_BUSTER}`,
                bgColor: "bg-blue-950",
                timestamp: 63,
                slowScroll: true
            },
            {
                id: 6,
                lyrics: "I took her to a supermarket\nI don't know why but I had to start it somewhere\nSo it started there",
                image: `${REPO_BASE_URL}6.jpg${CACHE_BUSTER}`,
                bgColor: "bg-zinc-800",
                timestamp: 93
            },
            {
                id: 7,
                lyrics: "I said pretend you've got no money\nShe just laughed and said oh you're so funny\nI said yeah?\nWell I can't see anyone else smiling in here",
                image: `${REPO_BASE_URL}7.jpg${CACHE_BUSTER}`,
                bgColor: "bg-red-950",
                timestamp: 108,
                slowScroll: true
            },
            {
                id: 8,
                lyrics: "Are you sure you wanna live like common people\nYou wanna see whatever common people see\nYou wanna sleep with common people like me?",
                image: `${REPO_BASE_URL}8.jpg${CACHE_BUSTER}`,
                bgColor: "bg-indigo-950",
                timestamp: 124,
                slowScroll: true
            },
            {
                id: 9,
                lyrics: "But still you'll never get it right\n'Cause when you're laid in bed at night\nWatching roaches climb the wall\nIf you called your dad he could stop it all, yeah",
                image: `${REPO_BASE_URL}9.jpg${CACHE_BUSTER}`, 
                bgColor: "bg-slate-900",
                timestamp: 155,
                superSlowScroll: true
            },
            {
                id: 10,
                lyrics: "Sing along with the common people\nSing along and it might just get you through\nLaugh along with the common people\nLaugh along even though they're laughing at you",
                image: `${REPO_BASE_URL}10.jpg${CACHE_BUSTER}`,
                bgColor: "bg-orange-950",
                timestamp: 185,
                slowScroll: true
            },
            {
                id: 11,
                lyrics: "Like a dog lying in a corner\nThey will bite you and never warn you\nLook out, they'll tear your insides out\n'Cause everybody hates a tourist",
                image: `${REPO_BASE_URL}11.jpg${CACHE_BUSTER}`,
                bgColor: "bg-red-900",
                timestamp: 229,
                slowScroll: true
            },
            {
                id: 12,
                lyrics: "Rent a flat above a shop\nCut your hair and get a job\nSmoke some fags and play some pool\nPretend you never went to school",
                image: `${REPO_BASE_URL}12.jpg${CACHE_BUSTER}`,
                bgColor: "bg-purple-950",
                timestamp: 259
            },
            {
                id: 13,
                lyrics: "I wanna live with common people like you\nI wanna live with common people like you\nI wanna live with common people like you...",
                image: `${REPO_BASE_URL}13.jpg${CACHE_BUSTER}`,
                bgColor: "bg-pink-900",
                timestamp: 275,
                superSlowScroll: true
            },
            {
                id: 14,
                lyrics: "You'll never live like common people\nYou'll never do what common people do...\nNever fail like common people\nYou'll never watch your life slide out of view",
                image: `${REPO_BASE_URL}14.jpg${CACHE_BUSTER}`,
                bgColor: "bg-slate-950",
                timestamp: 320,
                slowScroll: true
            }
        ];

        const ComicReader = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [audioStatus, setAudioStatus] = useState('loading');
            const [autoFlip, setAutoFlip] = useState(true);
            const [isImmersive, setIsImmersive] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            
            const audioRef = useRef(null);
            const lyricScrollRef = useRef(null);
            const totalPages = pages.length;
            const defaultAudioUrl = "https://raw.githubusercontent.com/sinanseden-eng/common-people/main/Common%20People.mp3?v=26";

            const togglePlay = () => {
                if (audioRef.current) {
                    if (isPlaying) audioRef.current.pause();
                    else audioRef.current.play().catch(() => setAudioStatus('error'));
                    setIsPlaying(!isPlaying);
                }
            };

            const handleTimeUpdate = () => {
                if (!audioRef.current) return;
                const time = audioRef.current.currentTime;
                setCurrentTime(time);
                if (!autoFlip) return;
                
                let activeIndex = 0;
                for (let i = 0; i < pages.length; i++) {
                    if (time >= pages[i].timestamp) activeIndex = i;
                    else break;
                }
                if (activeIndex !== currentPage) setCurrentPage(activeIndex);
            };

            useEffect(() => {
                const container = lyricScrollRef.current;
                if (!container) return;
                const currentData = pages[currentPage];
                const nextData = pages[currentPage + 1];
                const startTime = currentData.timestamp;
                const endTime = nextData ? nextData.timestamp : (audioRef.current?.duration || startTime + 20);
                
                const durationElapsed = endTime - startTime;
                const elapsed = currentTime - startTime;
                
                if (elapsed >= 0 && durationElapsed > 0) {
                    let progress = elapsed / durationElapsed;
                    if (currentData.superSlowScroll) progress = Math.pow(progress, 2.5); 
                    else if (currentData.slowScroll) progress = Math.pow(progress, 1.4); 
                    const maxScroll = container.scrollHeight - container.clientHeight;
                    if (maxScroll > 0) container.scrollTop = maxScroll * progress;
                }
            }, [currentTime, currentPage]);

            useEffect(() => {
                if (audioRef.current) {
                    const target = pages[currentPage].timestamp || 0;
                    if (Math.abs(audioRef.current.currentTime - target) > 3) {
                        audioRef.current.currentTime = target;
                    }
                }
            }, [currentPage]);

            const currentData = pages[currentPage];

            return (
                <div className="flex flex-col h-[100dvh] bg-gray-950 text-white font-sans overflow-hidden">
                    <audio 
                        ref={audioRef} 
                        loop 
                        preload="auto" 
                        src={defaultAudioUrl}
                        onTimeUpdate={handleTimeUpdate}
                        onLoadedMetadata={(e) => setDuration(e.target.duration)}
                        onCanPlay={() => setAudioStatus('ready')}
                        onError={() => setAudioStatus('error')}
                    />

                    {/* Header */}
                    <header className={`h-14 sm:h-16 shrink-0 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-4 z-40 transition-transform duration-300 ${isImmersive ? '-translate-y-full absolute w-full' : 'relative'}`}>
                        <div className="flex items-center space-x-2 text-pink-500 shrink-0">
                            <BookOpen size={20} />
                            <div className="hidden sm:flex flex-col">
                                <span className="font-bangers text-xl tracking-widest leading-none">COMMON PEOPLE</span>
                                <span className="font-comic text-[10px] text-pink-300 uppercase mt-0.5">Interactive Experience</span>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-black/40 px-4 py-2 rounded-full border border-gray-800 shadow-inner">
                            <div className="hidden md:flex items-center border-r border-gray-700 pr-3 mr-1">
                                <span className="w-2 h-2 rounded-full bg-pink-500 animate-pulse mr-2 shadow-[0_0_8px_rgba(236,72,153,0.8)]"></span>
                                <span className="text-[10px] font-bold text-gray-300 tracking-widest uppercase">Play & Sync</span>
                            </div>
                            <button onClick={() => setAutoFlip(!autoFlip)} className={`p-1 ${autoFlip ? 'text-green-500' : 'text-gray-500'}`} title="Auto-Flip Toggle"><Zap size={18}/></button>
                            <button onClick={togglePlay} className="text-white hover:text-pink-500 transition-colors">
                                {isPlaying ? <Pause size={22} /> : <Play size={22} />}
                            </button>
                            <button onClick={() => { if(audioRef.current) { audioRef.current.muted = !isMuted; setIsMuted(!isMuted); } }} className="p-1 text-gray-400 hover:text-white">
                                {isMuted ? <VolumeX size={18} /> : <Volume2 size={18} />}
                            </button>
                        </div>

                        <div className="text-xs sm:text-sm font-mono text-gray-500 w-12 text-right">{currentPage + 1}/{totalPages}</div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 min-h-0 relative flex items-center justify-center p-2 sm:p-4 w-full">
                        <button onClick={() => currentPage > 0 && setCurrentPage(currentPage - 1)} className="absolute left-2 sm:left-4 z-30 p-2 bg-black/50 text-white/50 hover:text-white rounded-full transition-colors"><ChevronLeft size={28}/></button>
                        <button onClick={() => currentPage < totalPages - 1 && setCurrentPage(currentPage + 1)} className="absolute right-2 sm:right-4 z-30 p-2 bg-black/50 text-white/50 hover:text-white rounded-full transition-colors"><ChevronRight size={28}/></button>

                        <div className="w-full max-w-5xl h-full flex flex-col items-center justify-center">
                            <div key={currentPage} className="comic-panel relative w-full h-full bg-white flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-500 rounded-lg">
                                <div className={`flex-1 relative overflow-hidden ${currentData.bgColor || 'bg-gray-200'} flex items-center justify-center w-full min-h-0 p-4 sm:p-6`}>
                                    {currentData.image && <img src={currentData.image} className="w-full h-full transition-all duration-300 object-contain" alt="Comic Panel" />}
                                    
                                    {/* Responsive Title Overlay */}
                                    {currentData.type === 'intro' && (
                                        <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-black/20 to-transparent flex flex-col items-center justify-start pt-12 sm:pt-20 p-4 text-center pointer-events-none">
                                            <h1 className="text-5xl sm:text-7xl font-black text-pink-500 font-bangers tracking-tighter transform -rotate-3 mb-2 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">COMMON</h1>
                                            <h1 className="text-5xl sm:text-7xl font-black text-white font-bangers tracking-tighter transform rotate-2 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">PEOPLE</h1>
                                        </div>
                                    )}
                                </div>
                                
                                {currentData.type !== 'intro' && (
                                    <div className="shrink-0 bg-white border-t-2 sm:border-t-4 border-black p-3 sm:p-6 flex flex-col items-center justify-center text-center relative h-[30%] min-h-[110px] max-h-[190px]">
                                        <div ref={lyricScrollRef} className="no-scrollbar overflow-y-auto w-full px-2 sm:px-6 h-full smooth-scroll">
                                            <div className="font-comic text-black text-lg sm:text-xl md:text-2xl font-bold py-2 sm:py-4">
                                                {currentData.lyrics.split('\n').map((line, i) => <p key={i} className="mb-1 sm:mb-2">{line}</p>)}
                                                <div className="h-32"></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {/* Signature relocated to bottom-left to avoid right-corner details */}
                                <div className="absolute bottom-2 left-6 font-signature text-2xl sm:text-4xl text-black/40 pointer-events-none">Sinan</div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComicReader />);
    </script>
</body>
</html>
